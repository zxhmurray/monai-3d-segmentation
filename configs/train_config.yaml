# 训练配置文件

# 数据配置
data:
  data_dir: "rawdata/MSD_Spleen"
  images_dir: "images"
  labels_dir: "labels"
  spatial_size: [128, 128, 128]  # Patch 尺寸
  pixdim: [1.0, 1.0, 1.0]       # 目标体素间距 (mm)
  ct_window: "abdomen"            # CT 窗宽窗位预设
  pos_ratio: 0.5                  # 正负样本裁剪比例

# DataLoader 配置
dataloader:
  batch_size: 1
  num_workers: 4
  shuffle: true
  pin_memory: true
  persistent_workers: true

# 模型配置
model:
  model_size: "medium"            # tiny / small / medium / large
  in_channels: 1
  out_channels: 1

# 损失函数配置
loss:
  type: "dice_ce"                # dice / dice_ce / focal_tversky
  lambda_dice: 1.0
  lambda_ce: 1.0
  sigmoid: true

# 训练配置
training:
  max_epochs: 200
  learning_rate: 0.0001           # 1e-4
  weight_decay: 0.00001          # 1e-5

  # 优化器
  optimizer: "AdamW"              # AdamW / Adam / SGD

  # 学习率调度
  lr_scheduler: "CosineAnnealingLR"
  lr_scheduler_params:
    T_max: 200
    eta_min: 0.000001            # 1e-6

  # AMP 混合精度
  amp: true

  # 验证
  val_interval: 5                 # 每 5 个 epoch 验证一次

  # 早停
  early_stopping: true
  early_stopping_patience: 20
  early_stopping_min_delta: 0.001

  # 梯度
  gradient_clip: 1.0
  gradient_accumulation_steps: 1

# 检查点配置
checkpoint:
  checkpoint_dir: "models/checkpoints"
  save_checkpoint: true
  save_best_only: true

# 日志配置
logging:
  log_dir: "results/logs"
  log_interval: 10

# 设备配置
device: "cuda"
