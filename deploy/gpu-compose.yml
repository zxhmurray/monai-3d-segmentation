# GPU 推理专用编排
# 使用 NVIDIA Docker 实现 GPU 加速

version: '3.8'

services:
  # FastAPI 后端服务 (GPU)
  api:
    build:
      context: ..
      dockerfile: ../Dockerfile
    container_name: monai-api-gpu
    ports:
      - "8000:8000"
    volumes:
      - ../models:/app/models
      - ../data/uploads:/app/data/uploads
      - ../results:/app/results
      - ../logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - MONAI_API_HOST=0.0.0.0
      - MONAI_API_PORT=8000
      - MONAI_API_MODEL_DIR=/app/models
      - MONAI_API_DEFAULT_MODEL=best_model.pt
      - MONAI_API_MODEL_DEVICE=cuda
      - CUDA_VISIBLE_DEVICES=0
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Redis 缓存 (可选)
  redis:
    image: redis:7-alpine
    container_name: monai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  # Celery Worker (可选，用于异步任务)
  celery-worker:
    build:
      context: ..
      dockerfile: ../Dockerfile
    container_name: monai-celery
    command: celery -A api.celery_app worker --loglevel=info
    volumes:
      - ../models:/app/models
      - ../data/uploads:/app/data/uploads
      - ../results:/app/results
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - api
    restart: unless-stopped

volumes:
  redis-data:

networks:
  default:
    name: monai-gpu-network
